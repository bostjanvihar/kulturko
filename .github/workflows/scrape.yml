name: Scrape events weekly

on:
  schedule:
    # Weekly, Monday 00:00 CEST (= Sunday 22:00 UTC). GitHub cron has no
    # DST, so in winter (CET, UTC+1) this fires at 23:00 Sunday local.
    - cron: "0 22 * * 0"
  workflow_dispatch: {}      # manual "Run workflow" button

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run scraper
        env:
          FB_TOKEN: ${{ secrets.FB_TOKEN }}       # optional — Graph API, only for pages you admin
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }} # Apify — Facebook pages via the apify adapter
        run: |
          set -o pipefail
          python -m scraper.main 2>&1 | tee scrape.log
      - name: Run summary            # renders in the run's "Summary" tab
        if: always()
        run: |
          {
            echo "## Scrape result"
            echo ""
            echo "### Facebook (Apify) sources"
            echo '```'
            grep -iE 'fb-|apify' scrape.log || echo "(no Facebook source lines — check APIFY_TOKEN)"
            echo '```'
            echo "### Per-source counts"
            echo '```'
            grep -E 'events|FAILED' scrape.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Commit updated data
        run: |
          git config user.name "kulturko-bot"
          git config user.email "actions@github.com"
          git add docs/data
          git diff --cached --quiet || git commit -m "data: weekly update $(date -u +%F)"
          git push
