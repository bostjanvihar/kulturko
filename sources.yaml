# ============================================================
# KULTURNI ZBIRALNIK — event aggregator configuration
# To adapt this to another town: edit town/timezone, then
# replace the sources list. Nothing else needs to change.
# site_url must match the repo slug (still `kulturko`) — the
# published .ics subscription URLs are built from it.
# ============================================================

town: Maribor
country: Slovenija
timezone: Europe/Ljubljana
site_url: https://bostjanvihar.github.io/kulturko
locale: sl

# How many days into the past to keep events visible (archive)
keep_past_days: 7
# How far ahead to look (some sites list a full season)
horizon_days: 365

# ------------------------------------------------------------
# SOURCES
# Each source uses one adapter:
#   rss          — RSS/Atom feed (most reliable); reads <ical:dtstart>,
#                  <ev:startdate> etc. regardless of namespace
#   jsonld       — schema.org Event JSON-LD embedded in pages
#   tribe        — WordPress "The Events Calendar" REST API (/wp-json/tribe/...)
#   wp_v2        — standard WP REST API for a custom post type; event date
#                  and venue are read from ACF fields via dot-paths
#   squarespace  — Squarespace event collection (<collection>?format=json)
#   nuxt_payload — Nuxt 3 sites: parses the __NUXT_DATA__ payload
#   woo_store    — WooCommerce ticket shop (public Store API); event date is
#                  parsed out of the product description
#   data_attr    — event list embedded as JSON in an HTML data-* attribute
#   grouped_options — sign-up form where each event is a checkbox option
#                  under a group heading that carries the date
#   html         — generic CSS-selector scraper (configure selectors below)
#   ics          — a plain .ics calendar URL
#
# `venue` forces a venue name; otherwise it's taken from the event data.
# `enabled: false` keeps a source in the file without running it.
# ------------------------------------------------------------

sources:

  # --- Aggregators (broad coverage, incl. Facebook events) -----------
  - id: kulturnik-maribor
    name: Kulturnik (Maribor)
    adapter: rss
    url: "https://dogodki.kulturnik.si/?where=Maribor&format=rss"
    notes: >
      Kulturnik aggregates Slovenian cultural events including ones
      announced only on Facebook (GT22, Klub KGB, ...), so it covers
      FB-only venues too. Dates are in <ical:dtstart>, venue in
      <ical:location>.

  - id: kulturnik-dvorana-tabor
    name: Kulturnik (Dvorana Tabor)
    adapter: rss
    url: "https://dogodki.kulturnik.si/?where=Dvorana%20Tabor&format=rss"
    venue: Dvorana Tabor

  - id: kulturnik-gt22
    name: Kulturnik (GT22)
    adapter: rss
    url: "https://dogodki.kulturnik.si/?where=GT22&format=rss"
    venue: GT22
    notes: >
      GT22's own site has no dated program; their scheduled performances
      (incl. Intimni oder) surface here with real dates.

  - id: kulturnik-pekarna
    name: Kulturnik (Pekarna)
    adapter: rss
    url: "https://dogodki.kulturnik.si/?where=Pekarna&format=rss"
    venue: MC Pekarna

  - id: kulturnik-gustaf
    name: Kulturnik (Gustaf)
    adapter: rss
    url: "https://dogodki.kulturnik.si/?where=Gustaf&format=rss"
    venue: Gustaf
    notes: >
      Clean dated feed for Dvorana Gustaf (their own site embeds dates in
      free text). Primary source; the direct `gustaf` scrape backs it up.

  - id: visitmaribor
    name: Visit Maribor
    enabled: false
    adapter: html
    url: "https://www.visitmaribor.si/si/kaj-poceti/dogodki-in-prireditve/vsi-dogodki-in-prireditve/"
    notes: >
      Client-side Angular app (Umbraco backend) — the event list is not in
      the HTML and there is no public JSON endpoint. Most of its content
      is covered by Kulturnik anyway.

  # --- Individual venues ---------------------------------------------
  - id: narodni-dom
    name: Narodni dom Maribor
    adapter: wp_v2
    url: "https://nd-mb.si"
    venue: Narodni dom Maribor
    rest_base: dogodek          # custom post type at /wp-json/wp/v2/dogodek
    orderby: modified           # upcoming events are re-synced daily
    per_page: 100
    max_pages: 4
    date_path: "acf.Bliznji_datum"          # "2026-07-31 20:30:00"
    venue_path: "acf.dogodek.0.Lokacija"    # "Vetrinjski Dvor, Vetrinjska..."
    desc_path: "acf.vsebina"
    notes: Covers Narodni dom, Vetrinjski dvor and Dvorana Union events.

  - id: minoriti
    name: Lutkovno gledališče Maribor / Minoriti
    adapter: nuxt_payload
    url: "https://www.minoriti.si/dogodki"
    venue: Minoriti

  - id: klub-kgb
    name: Klub KGB
    adapter: html
    url: "https://klub-kgb.si/dogodki"
    venue: Klub KGB
    year_from_url: '/dogodki/(\d{4})/'   # links look like /dogodki/2026/sep/slug
    selectors:
      item: '[data-slot="carousel-item"]'
      title: "h3"
      url: "a"
      date: "span.text-4xl"              # "11.09" (day.month)

  - id: gt22
    name: GT22
    enabled: false
    adapter: html
    url: "https://gt22.si/program/"
    venue: GT22
    notes: >
      gt22.si/program is empty — the venue announces events on Facebook
      only. Those surface through the Kulturnik aggregator above.

  - id: gt22-intimni-oder
    name: GT22 Intimni oder
    adapter: html
    url: "https://gt22.si/kategorija/intimni-oder/"
    venue: GT22
    follow_detail: true      # listing has no dates; read each post page
    selectors:
      item: ".box"
      title: "a.post-title-front"
      url: "a.post-title-front"
    notes: >
      Category posts are production pages; most have no date (those are
      skipped) — scheduled shows also arrive via the Kulturnik GT22 feed.

  - id: pekarna
    name: MC Pekarna
    adapter: html
    url: "https://www.pekarna.net/napovednik/"
    venue: MC Pekarna
    selectors:
      item: ".msl-concert-list .text-overflow"
      title: "h4.concert-title"
      url: "a"
      date: ".concert-meta"    # "Datum: sobota, 19 september 2026 Ura: 21:00"

  - id: gustaf
    name: Dvorana Gustaf
    adapter: html
    url: "https://www.gustaf.si/index.php/program"
    venue: Gustaf
    selectors:
      item: ".items-row .item"
      title: "h2.art-postheader a"
      url: "h2.art-postheader a"
      date: ".art-article"     # "18. 03. 2023 Pričetek ob 21:00" in the body
    notes: >
      Joomla category-blog. The date is embedded in the article body; the
      venue is on summer break so the listing may be empty (then this
      returns 0 and the Kulturnik Gustaf feed carries the schedule).

  - id: rozmarin
    name: Rozmarin
    adapter: html
    url: "https://www.rozmaringroup.si/dogodki"
    venue: Rozmarin
    selectors:
      item: ".event-item"
      title: "h6"
      url: "a"
      date: ".item-block__content-date"   # "20.06.2026"

  - id: stuk
    name: ŠTUK
    adapter: woo_store
    url: "https://vstopnice.stuk.org"
    venue: ŠTUK

  - id: sng-maribor
    name: SNG Maribor
    adapter: data_attr
    url: "https://www.sng-mb.si/program/"
    venue: SNG Maribor
    event_url_prefix: "/event/"
    selectors:
      item: ".calendar-table[data-events]"

  - id: mladi-maribor
    name: Mladi Maribor
    adapter: tribe
    url: "https://mladimaribor.si"

  - id: mkc-maribor
    name: MKC Maribor
    adapter: squarespace
    url: "https://mkc.si/koledar"     # the events collection behind /dogodki
    venue: MKC Maribor

  - id: zpm-maribor
    name: ZPM Maribor
    adapter: tribe
    url: "https://zpm-mb.si"
    venue: ZPM Maribor
    notes: No upcoming events during summer 2026; API works.

  - id: najstarejsa-trta
    name: Najstarejša trta
    adapter: html
    url: "https://najstarejsatrta.si/dogodki/"
    venue: Hiša Stare trte
    selectors:
      item: ".nectar-post-grid-item"
      title: "h2.post-heading"
      url: "h2.post-heading a"
      date: '[data-key="datum"]'   # "11. 11. 2026", "25. 9. 2026 → 27. 9. 2026"
    notes: >
      Salient/Nectar post grid; the date is a custom field rendered into
      data-key="datum". The WP REST API does not expose that field
      (acf is empty), so this must be scraped from the HTML. Only the few
      big annual events (rez trte, festival, trgatev, martinovanje) are
      listed — expect a handful, not a full program. Multi-day ranges are
      recorded at their start date, except when the first date carries no
      year ("26. 6.-4. 7. 2026"), where the parser takes the end date.

  - id: rajzefiber-sprehodi
    name: Rajzefiber (Festival sprehodov)
    adapter: grouped_options
    url: "https://rajzefiber.si/festival-sprehodov/prijave-na-sprehode/"
    venue: Rajzefiber
    selectors:
      group: "div.efbField"           # one per day + one per form field
      group_date: "label.col-form-label"   # "PETEK, 20. 3. 2026"
      item: "div.form-check label"         # "16.00 - Poetičen Maribor"
    strip_re: '\s*/\s*ZAPRTE PRIJAVE\s*$'
    notes: >
      The walks only exist as checkbox options in the Easy Form Builder
      signup form — there is no event listing or feed. Festival sprehodov
      runs once a year (2026 edition was 20.–28. 3.), so outside the
      signup window this returns 0 or only past events; the form is
      repopulated ahead of each edition.

  - id: ugm
    name: Umetnostna galerija Maribor
    adapter: html
    url: "https://www.ugm.si/dogodki/"
    venue: UGM
    selectors:
      item: ".event-item"
      title: "h5"
      url: "a"
      date: "time"                      # "7. 7. 26–25. 8. 26"

  # --- Facebook (via Apify) -------------------------------------------
  # Facebook blocks anonymous scraping, so these run through the Apify
  # Facebook Events Scraper (adapter "apify" in scraper/adapter_apify.py).
  # Requires the APIFY_TOKEN repository secret. Keep max_events modest —
  # the actor bills per result and one run per page happens daily.
  # (The facebook_graph adapter also exists for pages you administer;
  # it needs the FB_TOKEN secret and a page_id.)

  - id: fb-stara-trta
    name: Hiša Stare trte (Facebook)
    adapter: apify
    page_url: "https://www.facebook.com/WorldsOldestGrapevine/events"
    venue: Hiša Stare trte
    max_events: 15

  - id: fb-postna-ulica
    name: Poštna ulica (Facebook)
    adapter: apify
    page_url: "https://www.facebook.com/PostnaUlicaMB/events"
    venue: Poštna ulica
    max_events: 15

  - id: fb-piaf
    name: Piaf (Facebook)
    adapter: apify
    page_url: "https://www.facebook.com/piaf.maribor/events"
    venue: Piaf
    max_events: 15

  - id: fb-luft
    name: Luft (Facebook)
    adapter: apify
    page_url: "https://www.facebook.com/luftmaribor/events"
    venue: Luft
    max_events: 15
